name: Build and Deploy houkago.blog

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        required: true
        default: "direct"
        type: choice
        options:
          - direct
          - hook-only

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Select mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=direct" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Vercel environment
        id: vercel-env
        shell: bash
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "build-args=--prod" >> "$GITHUB_OUTPUT"
            echo "deploy-args=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "build-args=" >> "$GITHUB_OUTPUT"
            echo "deploy-args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout houkago.blog
        if: steps.mode.outputs.value == 'direct'
        uses: actions/checkout@v4
        with:
          path: houkago.blog

      - name: Checkout houkago.posts
        if: steps.mode.outputs.value == 'direct'
        uses: actions/checkout@v4
        with:
          repository: HOKAGO-MEMORIES/houkago.posts
          token: ${{ secrets.HOUKAGO_POSTS_ACCESS_TOKEN }}
          path: houkago.posts

      - name: Setup Node.js
        if: steps.mode.outputs.value == 'direct'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: houkago.blog/package-lock.json

      - name: Install Vercel CLI
        if: steps.mode.outputs.value == 'direct'
        run: npm install --global vercel@latest

      - name: Install dependencies
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        run: npm ci

      - name: Pull Vercel environment information
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        run: vercel pull --yes --environment=${{ steps.vercel-env.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build blog with posts content
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        env:
          POSTS_REPO_PATH: ../houkago.posts
        run: vercel build ${{ steps.vercel-env.outputs.build-args }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to Vercel
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if vercel deploy --prebuilt ${{ steps.vercel-env.outputs.deploy-args }} --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 30))
          done

      - name: Trigger Vercel Deploy Hook
        if: steps.mode.outputs.value == 'hook-only'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
