name: Build and Deploy houkago.blog

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        required: true
        default: "direct"
        type: choice
        options:
          - direct
          - hook-only

jobs:
  deploy-production:
    name: Deploy Production
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Select mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=direct" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout houkago.blog
        if: steps.mode.outputs.value == 'direct'
        uses: actions/checkout@v4
        with:
          path: houkago.blog

      - name: Checkout houkago.posts
        if: steps.mode.outputs.value == 'direct'
        uses: actions/checkout@v4
        with:
          repository: HOKAGO-MEMORIES/houkago.posts
          token: ${{ secrets.HOUKAGO_POSTS_ACCESS_TOKEN }}
          path: houkago.posts

      - name: Setup Node.js
        if: steps.mode.outputs.value == 'direct'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: houkago.blog/package-lock.json

      - name: Install Vercel CLI
        if: steps.mode.outputs.value == 'direct'
        run: npm install --global vercel@latest

      - name: Install dependencies
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        run: npm ci

      - name: Pull Vercel production environment
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production with posts content
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        env:
          POSTS_REPO_PATH: ../houkago.posts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production prebuilt output
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 30))
          done

      - name: Trigger Vercel Deploy Hook
        if: steps.mode.outputs.value == 'hook-only'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"

  deploy-preview:
    name: Deploy Preview
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Select mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=direct" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout houkago.blog
        if: steps.mode.outputs.value == 'direct'
        uses: actions/checkout@v4
        with:
          path: houkago.blog

      - name: Checkout houkago.posts
        if: steps.mode.outputs.value == 'direct'
        uses: actions/checkout@v4
        with:
          repository: HOKAGO-MEMORIES/houkago.posts
          token: ${{ secrets.HOUKAGO_POSTS_ACCESS_TOKEN }}
          path: houkago.posts

      - name: Setup Node.js
        if: steps.mode.outputs.value == 'direct'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: houkago.blog/package-lock.json

      - name: Install Vercel CLI
        if: steps.mode.outputs.value == 'direct'
        run: npm install --global vercel@latest

      - name: Install dependencies
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        run: npm ci

      - name: Pull Vercel preview environment
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview with posts content
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        env:
          POSTS_REPO_PATH: ../houkago.posts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview prebuilt output
        if: steps.mode.outputs.value == 'direct'
        working-directory: houkago.blog
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 30))
          done

      - name: Trigger Vercel Deploy Hook
        if: steps.mode.outputs.value == 'hook-only'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
